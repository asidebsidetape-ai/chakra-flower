<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脈輪花精測試</title>
    <style>
        /* 基礎全螢幕設定 */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 背景設定：強制蓋過全螢幕 */
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg_main.jpg?v=2') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        /* 舞台區域：控制人像跟脈輪的相對位置 */
        .stage {
            position: relative;
            width: 80vw; 
            max-width: 400px;
            aspect-ratio: 1 / 1.5; /* 維持人像比例 */
        }

        /* 人像主圖：增加對比陰影，解決手鐲白色塊問題 */
        .main-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* 強力陰影濾鏡：幫助去背邊緣與背景分離 */
            filter: drop-shadow(0 0 12px rgba(0,0,0,0.4)) brightness(1.05);
        }

        /* 脈輪發光球點：統一設定 */
        .chakra {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 15px;
            border-radius: 50%;
            box-shadow: 0 0 15px white;
            animation: breathe 3s infinite ease-in-out;
            z-index: 10;
        }

        /* 7 脈輪精準座標 (配合白色剪影比例) */
        .c7 { top: 18%; background: #ffffff; box-shadow: 0 0 20px #fff; } /* 頂輪 */
        .c6 { top: 28%; background: #4b0082; } /* 眉心輪 */
        .c5 { top: 38%; background: #00bfff; } /* 喉輪 */
        .c4 { top: 50%; background: #32cd32; } /* 心輪 */
        .c3 { top: 62%; background: #ffff00; } /* 太陽輪 */
        .c2 { top: 74%; background: #ff8c00; } /* 生殖輪 */
        .c1 { top: 85%; background: #ff0000; } /* 海底輪：絕對不懸空 */

        /* 呼吸動畫 */
        @keyframes breathe {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.3); }
        }

        h1 {
            position: absolute; top: 5%; width: 100%; text-align: center;
            color: white; font-family: sans-serif; font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <h1>畫質與定位最終實測</h1>
    
    <div class="stage">
        <img src="human_aura.png?v=2" class="main-img">
        
        <div class="chakra c7"></div>
        <div class="chakra c6"></div>
        <div class="chakra c5"></div>
        <div class="chakra c4"></div>
        <div class="chakra c3"></div>
        <div class="chakra c2"></div>
        <div class="chakra c1"></div>
    </div>
</body>
</html>
